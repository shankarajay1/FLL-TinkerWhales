<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cancer–Radiation Exposure Correlation Explorer</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
  :root {
    --ink: #1f2933;
    --muted: #52616b;
    --line: #d7dde3;
    --bg: #f4f6f8;
    --card: #ffffff;
    --accent: #2563eb;
    --warn-bg: #fff7ed;
    --warn-border: #fdba74;
    --danger: #dc2626;
    --safe: #2563eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }
  .brandhead { display: flex; align-items: center; gap: 16px; margin-bottom: 4px; }
  .brandlogo { flex: 0 0 auto; border-radius: 12px; }
  h1 { font-size: 26px; margin: 8px 0 4px; }
  h2 { font-size: 20px; margin: 28px 0 10px; }
  h3 { font-size: 16px; margin: 18px 0 6px; }
  p { margin: 8px 0; }
  .subtitle { color: var(--muted); margin-top: 0; }
  .banner {
    background: var(--warn-bg);
    border: 2px solid var(--warn-border);
    border-radius: 10px;
    padding: 12px 16px;
    margin: 14px 0;
    font-size: 14px;
  }
  .banner strong { color: #9a3412; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    margin: 14px 0;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .legend { display: flex; flex-wrap: wrap; gap: 16px; font-size: 14px; margin: 8px 0 4px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; border: 1px solid rgba(0,0,0,0.25); }
  .tri { width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 14px solid #111; display: inline-block; }
  svg { width: 100%; height: auto; background: #dbeafe; border-radius: 10px; border: 1px solid var(--line); }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 10px 0; }
  button {
    font: inherit; cursor: pointer; border: 1px solid var(--accent);
    background: var(--accent); color: #fff; padding: 8px 14px; border-radius: 8px;
  }
  button.secondary { background: #fff; color: var(--accent); }
  select { font: inherit; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--line); background:#fff; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 14px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); }
  th { background: #f0f4f8; }
  .bar-track { background: #e5ebf1; border-radius: 6px; height: 18px; width: 100%; overflow: hidden; }
  .bar-fill { background: var(--danger); height: 100%; }
  .stat-big { font-size: 22px; font-weight: 700; }
  .caveat { background: #f0fdf4; border: 2px solid #86efac; border-radius: 10px; padding: 14px 16px; }
  .future { background: #eef2ff; border: 2px solid #c7d2fe; border-radius: 10px; padding: 16px; }
  .pill { display:inline-block; background:#e0e7ff; color:#3730a3; border-radius:999px; padding:2px 10px; font-size:12px; font-weight:600; }
  ul { margin: 6px 0 6px 0; padding-left: 20px; }
  li { margin: 4px 0; }
  .muted { color: var(--muted); font-size: 13px; }
  .tooltip {
    position: fixed; pointer-events: none; background: #111; color: #fff;
    font-size: 12px; padding: 6px 8px; border-radius: 6px; z-index: 50; max-width: 240px;
    transform: translate(10px, -10px);
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 720px) { .grid2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useRef } = React;

// ---------------------------------------------------------------------------
// REAL contamination site coordinates (public/historical reference locations).
// These locate the sites on the map. They contain NO patient data.
// ---------------------------------------------------------------------------
const SITES = [
  { id: "hanford",   name: "Hanford Site (WA)",            lat: 46.5500, lon: -119.4880 },
  { id: "oakridge",  name: "Oak Ridge (TN)",               lat: 35.9300, lon: -84.3100 },
  { id: "losalamos", name: "Los Alamos (NM)",              lat: 35.8440, lon: -106.2870 },
  { id: "slaps",     name: "SLAPS – St. Louis Airport (MO)",lat: 38.7490, lon: -90.3700 },
  { id: "slds",      name: "SLDS – Downtown St. Louis (MO)",lat: 38.6340, lon: -90.2030 },
  { id: "coldwater", name: "Coldwater Creek (MO)",         lat: 38.7900, lon: -90.3300 },
  { id: "hiss",      name: "HISS / Futura (MO)",           lat: 38.7560, lon: -90.3580 },
  { id: "tonawanda", name: "Tonawanda / Niagara (NY)",     lat: 43.0200, lon: -78.9300 },
];

// ---------------------------------------------------------------------------
// REAL counties that contain (or are nearest to) each contamination site.
// These are the geographic units at which official cancer data is released —
// registries publish AGGREGATED, age-adjusted rates per county, NEVER
// individual patients. Each county is wired to its official NCI State Cancer
// Profiles source page. NO rate values are pre-filled — the user must enter the
// verified number from the source, so nothing here is invented or fake.
// "lat/lon" are approximate county centroids, used only for distance-to-site.
// ---------------------------------------------------------------------------
const COUNTIES = [
  { fips: "53005", name: "Benton County, WA",     forSite: "hanford",   lat: 46.25, lon: -119.51 },
  { fips: "47001", name: "Anderson County, TN",   forSite: "oakridge",  lat: 36.12, lon: -84.20 },
  { fips: "35028", name: "Los Alamos County, NM", forSite: "losalamos", lat: 35.87, lon: -106.30 },
  { fips: "29189", name: "St. Louis County, MO",  forSite: "coldwater", lat: 38.64, lon: -90.43 },
  { fips: "29510", name: "St. Louis City, MO",    forSite: "slds",      lat: 38.63, lon: -90.24 },
  { fips: "36029", name: "Erie County, NY",       forSite: "tonawanda", lat: 42.77, lon: -78.78 },
  { fips: "36063", name: "Niagara County, NY",    forSite: "tonawanda", lat: 43.17, lon: -78.75 },
];

// Build the official NCI State Cancer Profiles source URL for a county
// (all-cancer-sites, both sexes, all ages, age-adjusted incidence).
function sourceUrlFor(fips) {
  const stateFIPS = fips.slice(0, 2);
  const countyFIPS = fips;
  return (
    "https://statecancerprofiles.cancer.gov/incidencerates/index.php?" +
    `stateFIPS=${stateFIPS}&areatype=county&cancer=001&race=00&sex=0` +
    `&age=001&stage=999&type=incd&sortVariableName=rate&sortOrder=default` +
    `&output=1&fips=${countyFIPS}`
  );
}

// ---------------------------------------------------------------------------
// Distance: Haversine (great-circle) in miles.
// ---------------------------------------------------------------------------
function distanceMiles(lat1, lon1, lat2, lon2) {
  const R = 3958.8; // Earth radius in miles
  const toRad = (d) => (d * Math.PI) / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

// ---------------------------------------------------------------------------
// Seeded random generator so the synthetic dataset is reproducible.
// ---------------------------------------------------------------------------
function makeRng(seed) {
  let s = seed >>> 0;
  return function () {
    s = (s * 1664525 + 1013904223) >>> 0;
    return s / 4294967296;
  };
}

const CANCER_TYPES = ["Thyroid", "Leukemia", "Lung", "Bone", "Breast", "Other"];

// ---------------------------------------------------------------------------
// Generate ~200 SIMULATED residents. NOT REAL PEOPLE / NOT REAL PATIENTS.
// We intentionally bake in a mild proximity effect so the demo can show a
// pattern — this is a teaching model, not evidence about real cancer rates.
// ---------------------------------------------------------------------------
function generateResidents(seed) {
  const rng = makeRng(seed);
  const residents = [];
  const N = 200;
  for (let i = 0; i < N; i++) {
    // Scatter residents around a randomly chosen site (some far, some near).
    const site = SITES[Math.floor(rng() * SITES.length)];
    const spread = 0.05 + rng() * 0.9; // degrees of scatter (~3 to ~60 mi)
    const lat = site.lat + (rng() - 0.5) * spread;
    const lon = site.lon + (rng() - 0.5) * spread * 1.3;

    // nearest-site distance for this resident
    let nearest = Infinity;
    let nearestSite = null;
    for (const s of SITES) {
      const d = distanceMiles(lat, lon, s.lat, s.lon);
      if (d < nearest) { nearest = d; nearestSite = s; }
    }

    // Simulated cancer probability: small baseline + a gentle bump when closer.
    // (Synthetic teaching signal only.)
    const base = 0.07;
    const proximityBump = nearest < 5 ? 0.16 : nearest < 15 ? 0.08 : 0.0;
    const p = base + proximityBump;
    const hasCancer = rng() < p;
    const cancerType = hasCancer ? CANCER_TYPES[Math.floor(rng() * CANCER_TYPES.length)] : null;

    residents.push({
      id: "SIM-" + String(i + 1).padStart(3, "0"),
      lat, lon,
      hasCancer,
      cancerType,
      nearestMiles: nearest,
      nearestSiteId: nearestSite.id,
    });
  }
  return residents;
}

// ---------------------------------------------------------------------------
// Map projection. We use d3's Albers USA projection — the same realistic,
// atlas-style US map shape used in professional maps — drawn into a 975x610
// canvas. Real state geometry is loaded from the public "us-atlas" TopoJSON
// dataset (a static data file from a CDN, like React itself). No map tiles,
// no map service, and no API key are used.
// ---------------------------------------------------------------------------
const VIEW = { w: 975, h: 610 };
const hasD3 = typeof d3 !== "undefined" && d3.geoAlbersUsa;
const projection = hasD3
  ? d3.geoAlbersUsa().scale(1300).translate([VIEW.w / 2, VIEW.h / 2])
  : null;
const geoPath = hasD3 ? d3.geoPath(projection) : null;

// Returns {x, y} in canvas coords, or null if the point falls outside the US.
function project(lat, lon) {
  if (!projection) return null;
  const p = projection([lon, lat]);
  return p ? { x: p[0], y: p[1] } : null;
}

function MapView({ residents, sites, showHealthy, statesGeo, onHover, onLeave }) {
  return (
    <svg viewBox={`0 0 ${VIEW.w} ${VIEW.h}`} role="img" aria-label="Map of simulated residents and contamination sites">
      {/* real US states */}
      {statesGeo
        ? statesGeo.map((f) => (
            <path
              key={f.id}
              d={geoPath(f)}
              fill="#e8efe6"
              stroke="#a9bda6"
              strokeWidth="0.7"
              strokeLinejoin="round"
            />
          ))
        : (
          <text x={VIEW.w / 2} y={VIEW.h / 2} textAnchor="middle" fill="#94a3b8" fontSize="16">
            Loading US map…
          </text>
        )}

      {/* residents */}
      {residents.map((r) => {
        if (!showHealthy && !r.hasCancer) return null;
        const pt = project(r.lat, r.lon);
        if (!pt) return null;
        const { x, y } = pt;
        return (
          <circle
            key={r.id}
            cx={x} cy={y} r={4.5}
            fill={r.hasCancer ? "#dc2626" : "#2563eb"}
            fillOpacity={r.hasCancer ? 0.9 : 0.45}
            stroke="#ffffff" strokeWidth="0.8"
            onMouseMove={(e) => onHover(e, `${r.id} — ${r.hasCancer ? "Cancer: " + r.cancerType : "No cancer"} • ${r.nearestMiles.toFixed(1)} mi to nearest site`)}
            onMouseLeave={onLeave}
          />
        );
      })}

      {/* sites (triangles on top) */}
      {sites.map((s) => {
        const pt = project(s.lat, s.lon);
        if (!pt) return null;
        const { x, y } = pt;
        return (
          <g key={s.id}
             onMouseMove={(e) => onHover(e, `Contamination site: ${s.name}`)}
             onMouseLeave={onLeave}>
            {/* highlight halo around each contaminated city */}
            <circle cx={x} cy={y} r={16} fill="#f59e0b" fillOpacity={0.18} stroke="#f59e0b" strokeOpacity={0.5} strokeWidth="1" />
            <polygon
              points={`${x},${y-9} ${x-8},${y+6} ${x+8},${y+6}`}
              fill="#111827" stroke="#fbbf24" strokeWidth="1.5"
            />
            <text x={x + 12} y={y + 4} fontSize="11" fontWeight="600" fill="#7c2d12"
                  stroke="#ffffff" strokeWidth="3" paintOrder="stroke">
              {s.name.replace(/\s*\(.*\)\s*/, "")}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

// ---------------------------------------------------------------------------
// Statistics: bin residents by distance and compute cancer rate per bin.
// ---------------------------------------------------------------------------
const BINS = [
  { key: "near", label: "Within 5 miles", test: (d) => d < 5 },
  { key: "mid",  label: "5 to 15 miles",  test: (d) => d >= 5 && d < 15 },
  { key: "far",  label: "15+ miles",      test: (d) => d >= 15 },
];

function computeStats(residents) {
  return BINS.map((b) => {
    const group = residents.filter((r) => b.test(r.nearestMiles));
    const cases = group.filter((r) => r.hasCancer).length;
    const total = group.length;
    const rate = total ? (cases / total) * 100 : 0;
    return { ...b, total, cases, rate };
  });
}

// ---------------------------------------------------------------------------
// REAL-DATA MODE helpers.
// Each county's distance is the straight-line distance from its centroid to
// the nearest contamination site (same Haversine used for the demo).
// ---------------------------------------------------------------------------
function countyNearestMiles(county) {
  let nearest = Infinity, nearestSite = null;
  for (const s of SITES) {
    const d = distanceMiles(county.lat, county.lon, s.lat, s.lon);
    if (d < nearest) { nearest = d; nearestSite = s; }
  }
  return { miles: nearest, site: nearestSite };
}

// Flexible CSV parser for convenience uploads. It looks, on each line, for a
// known county FIPS code or county name, then grabs the first plausible
// "rate" number (between 20 and 2000 cases per 100,000) on that line.
function parseRatesCsv(text) {
  const out = {};
  const lines = text.split(/\r?\n/);
  for (const line of lines) {
    for (const c of COUNTIES) {
      const hasFips = line.includes(c.fips);
      const hasName = line.toLowerCase().includes(c.name.split(",")[0].toLowerCase());
      if (hasFips || hasName) {
        const nums = (line.match(/\d{2,4}(?:\.\d+)?/g) || [])
          .map(Number)
          .filter((n) => n >= 20 && n <= 2000 && String(n) !== c.fips);
        if (nums.length) out[c.fips] = nums[0];
      }
    }
  }
  return out;
}

// Real-data view: county-level aggregated rates entered/verified by the user.
function RealCountyData() {
  const [rates, setRates] = React.useState({}); // fips -> rate per 100,000
  const [benchmark, setBenchmark] = React.useState(""); // US national rate, user-entered
  const fileRef = React.useRef(null);

  const rows = COUNTIES.map((c) => {
    const near = countyNearestMiles(c);
    return { ...c, miles: near.miles, site: near.site };
  });

  const setRate = (fips, val) =>
    setRates((r) => ({ ...r, [fips]: val === "" ? undefined : Number(val) }));

  const onUpload = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const parsed = parseRatesCsv(String(reader.result));
      setRates((prev) => ({ ...prev, ...parsed }));
    };
    reader.readAsText(file);
  };

  // Bin the REAL county rates by centroid distance and average them.
  const bins = BINS.map((b) => {
    const group = rows.filter(
      (c) => rates[c.fips] !== undefined && b.test(c.miles)
    );
    const avg = group.length
      ? group.reduce((sum, c) => sum + rates[c.fips], 0) / group.length
      : null;
    return { ...b, count: group.length, avg };
  });
  const bm = benchmark === "" ? null : Number(benchmark);

  return (
    <div className="card" style={{ borderColor: "#86efac", borderWidth: 2 }}>
      <h2 style={{ marginTop: 0 }}>
        5. Real Aggregated County Data{" "}
        <span className="pill" style={{ background: "#dcfce7", color: "#166534" }}>
          REAL counties · YOU enter verified rates
        </span>
      </h2>
      <p>
        This panel is the <strong>honest, real-world version</strong> of the demo above. Official cancer
        registries release <strong>aggregated, age-adjusted rates per county</strong> — never individual
        people with addresses. So here we list the <strong>real counties</strong> that contain your sites and
        let you fill in the <strong>verified rate</strong> from the official source. <strong>Nothing is
        pre-filled</strong>, so no number here is made up.
      </p>
      <p className="muted">
        How to use: click each county's <strong>“official source ↗”</strong> link, read the age-adjusted
        all-cancer incidence rate (cases per 100,000), and type it in. Or download the CSV from the source and
        upload it below to auto-fill.
      </p>

      <div className="controls">
        <label className="muted">
          US national benchmark rate (per 100,000), from source:&nbsp;
          <input
            type="number" value={benchmark} placeholder="e.g. 440"
            onChange={(e) => setBenchmark(e.target.value)}
            style={{ width: 90, padding: "6px 8px", border: "1px solid var(--line)", borderRadius: 6 }}
          />
        </label>
        <button className="secondary" onClick={() => fileRef.current && fileRef.current.click()}>
          ⬆ Upload rates CSV
        </button>
        <input ref={fileRef} type="file" accept=".csv,text/csv" onChange={onUpload} style={{ display: "none" }} />
        <button className="secondary" onClick={() => { setRates({}); setBenchmark(""); }}>
          Clear
        </button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Real county</th>
            <th>Nearest site (distance)</th>
            <th>Verified rate / 100k</th>
            <th>vs. benchmark</th>
            <th>Official source</th>
          </tr>
        </thead>
        <tbody>
          {rows.map((c) => {
            const rate = rates[c.fips];
            let vs = "—";
            if (rate !== undefined && bm !== null) {
              const diff = rate - bm;
              vs = (diff >= 0 ? "+" : "") + diff.toFixed(1) + " (" +
                   (diff >= 0 ? "above" : "below") + " US)";
            }
            return (
              <tr key={c.fips}>
                <td><strong>{c.name}</strong></td>
                <td>{c.site.name} · {c.miles.toFixed(0)} mi</td>
                <td>
                  <input
                    type="number" value={rate === undefined ? "" : rate}
                    placeholder="enter"
                    onChange={(e) => setRate(c.fips, e.target.value)}
                    style={{ width: 80, padding: "5px 7px", border: "1px solid var(--line)", borderRadius: 6 }}
                  />
                </td>
                <td>{vs}</td>
                <td>
                  <a href={sourceUrlFor(c.fips)} target="_blank" rel="noopener noreferrer">
                    official source ↗
                  </a>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>

      <h3>Real rate by distance to a site (averaged across counties)</h3>
      <p className="muted">
        Same idea as the demo, but using the <strong>real numbers you entered</strong>. It only fills in once
        you've added rates. With just a few counties this is a tiny sample — read it as a starting picture, not
        proof.
      </p>
      <table>
        <thead>
          <tr><th>Distance group</th><th># counties with data</th><th>Average real rate / 100k</th></tr>
        </thead>
        <tbody>
          {bins.map((b) => (
            <tr key={b.key}>
              <td><strong>{b.label}</strong></td>
              <td>{b.count}</td>
              <td className="stat-big">{b.avg === null ? "—" : b.avg.toFixed(1)}</td>
            </tr>
          ))}
        </tbody>
      </table>
      <p className="muted">
        Reminder: even real, correctly-sourced county rates still <strong>cannot prove causation</strong> —
        the same confounders (age, smoking, other pollutants, how long people lived there) apply. County
        centroid distance is also a rough stand-in for true personal exposure.
      </p>
    </div>
  );
}

function App() {
  const [seed, setSeed] = useState(42);
  const [showHealthy, setShowHealthy] = useState(true);
  const [siteFilter, setSiteFilter] = useState("all");
  const [tooltip, setTooltip] = useState(null);
  const [statesGeo, setStatesGeo] = useState(null);
  const tipRef = useRef(null);

  // Load real US state geometry once (static TopoJSON from a CDN; no API key).
  React.useEffect(() => {
    if (typeof topojson === "undefined") return;
    fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json")
      .then((res) => res.json())
      .then((us) => {
        const fc = topojson.feature(us, us.objects.states);
        setStatesGeo(fc.features);
      })
      .catch(() => setStatesGeo(null));
  }, []);

  const residents = useMemo(() => generateResidents(seed), [seed]);

  const filtered = useMemo(() => {
    if (siteFilter === "all") return residents;
    return residents.filter((r) => r.nearestSiteId === siteFilter);
  }, [residents, siteFilter]);

  const stats = useMemo(() => computeStats(filtered), [filtered]);
  const maxRate = Math.max(1, ...stats.map((s) => s.rate));

  const totalCases = filtered.filter((r) => r.hasCancer).length;

  const onHover = (e, text) => setTooltip({ x: e.clientX, y: e.clientY, text });
  const onLeave = () => setTooltip(null);

  return (
    <div className="wrap">
      <div className="brandhead">
        <img className="brandlogo" src="tinkerwhales-logo.svg"
             alt="TinkerWhales FLL Team 63015 logo" width="84" height="84" />
        <div>
          <h1>Cancer–Radiation Exposure Correlation Explorer</h1>
          <p className="subtitle">
        A FIRST LEGO League Innovation Project · Manhattan Project legacy contamination sites
      </p>
        </div>
      </div>

      <div className="banner">
        <strong>⚠️ DEMONSTRATION ONLY — SIMULATED DATA.</strong> Every "resident" dot on this map is{" "}
        <strong>fake, computer-generated sample data</strong> created just to show how the tool would work.
        These are <strong>not real people and not real patients</strong>. A real version would require{" "}
        <strong>IRB (ethics board) approval</strong> and a signed <strong>Data Use Agreement</strong> before
        any real health data could be used.
      </div>

      {/* MAP CARD */}
      <div className="card">
        <h2>1. The Map</h2>
        <p>
          Black triangles ▲ are <strong>real contamination site locations</strong>. Each round dot is one{" "}
          <strong>simulated resident</strong>. Red = a simulated cancer diagnosis, blue = no cancer.
          Hover over any dot to see its details.
        </p>
        <div className="legend">
          <span><span className="tri"></span> Contamination site (real location)</span>
          <span><span className="dot" style={{background:"#dc2626"}}></span> Simulated resident — has cancer</span>
          <span><span className="dot" style={{background:"#2563eb", opacity:0.6}}></span> Simulated resident — no cancer</span>
        </div>
        <div className="controls">
          <label>Focus on a site:&nbsp;
            <select value={siteFilter} onChange={(e) => setSiteFilter(e.target.value)}>
              <option value="all">All sites</option>
              {SITES.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </label>
          <button className="secondary" onClick={() => setShowHealthy((v) => !v)}>
            {showHealthy ? "Hide no-cancer dots" : "Show no-cancer dots"}
          </button>
          <button onClick={() => setSeed((s) => s + 1)}>🔄 Generate a new fake sample</button>
        </div>
        <MapView
          residents={filtered}
          sites={siteFilter === "all" ? SITES : SITES.filter((s) => s.id === siteFilter)}
          showHealthy={showHealthy}
          statesGeo={statesGeo}
          onHover={onHover}
          onLeave={onLeave}
        />
        <p className="muted">
          Showing {filtered.length} simulated residents ({totalCases} with a simulated cancer diagnosis).
          Map uses a simple latitude/longitude grid — no online map service or API key.
        </p>
      </div>

      {/* PROXIMITY + STATS */}
      <div className="card">
        <h2>2 & 3. Proximity Calculator + Statistics</h2>
        <p>
          For every simulated resident, the tool measures the straight-line distance to the{" "}
          <strong>nearest</strong> contamination site. Then it puts residents into three distance groups
          ("bins") and asks a simple question: <strong>in which group do more people have cancer?</strong>
        </p>

        <table>
          <thead>
            <tr>
              <th>Distance group</th>
              <th># residents</th>
              <th># with cancer</th>
              <th>Cancer rate</th>
              <th style={{width:"30%"}}>How big is the rate?</th>
            </tr>
          </thead>
          <tbody>
            {stats.map((s) => (
              <tr key={s.key}>
                <td><strong>{s.label}</strong></td>
                <td>{s.total}</td>
                <td>{s.cases}</td>
                <td className="stat-big">{s.rate.toFixed(1)}%</td>
                <td>
                  <div className="bar-track">
                    <div className="bar-fill" style={{ width: `${(s.rate / maxRate) * 100}%` }}></div>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>

        <h3>What does "cancer rate" mean? (in plain words)</h3>
        <p className="muted">
          The cancer rate is just: <strong>(people with cancer ÷ total people in the group) × 100</strong>.
          If 20 people live in a group and 4 have cancer, the rate is 4 ÷ 20 = 0.20 = <strong>20%</strong>.
          If the bars get <em>taller as you get closer</em> to a site, that's a <strong>correlation</strong> —
          a pattern worth investigating. It does <strong>not</strong> prove the site caused the cancer.
        </p>
      </div>

      {/* CAVEAT */}
      <div className="card caveat">
        <h2 style={{marginTop:0}}>4. Important: Correlation is NOT Causation</h2>
        <p>
          Even if the chart shows higher cancer rates closer to a site, that does <strong>not</strong> prove
          the radiation caused it. Two things can move together by <strong>coincidence</strong>, or because a{" "}
          <strong>third hidden reason</strong> is affecting both. Scientists call these hidden reasons{" "}
          <strong>confounding factors</strong>. For cancer, these include:
        </p>
        <ul>
          <li><strong>Age</strong> — older neighborhoods naturally have more cancer cases.</li>
          <li><strong>Smoking</strong> — a huge cause of cancer that has nothing to do with radiation.</li>
          <li><strong>Other pollutants</strong> — factories, traffic, or chemicals in the same area.</li>
          <li><strong>How long someone lived there</strong> — moving in last year is different from 40 years.</li>
          <li><strong>Genetics & family history</strong>, diet, and access to doctors.</li>
        </ul>
        <p>
          A real study has to carefully <em>account for</em> all of these before saying anything caused anything.
        </p>
      </div>

      {/* REAL AGGREGATED COUNTY DATA (option 2) */}
      <RealCountyData />

      {/* REAL WORLD IMPLEMENTATION */}
      <h2>Real-World Implementation <span className="pill">FUTURE WORK — NOT BUILT INTO THIS PROTOTYPE</span></h2>
      <div className="card future">
        <p>
          The map and individual-resident demo run on <strong>fake data</strong>; the county panel above (Section 5)
          uses <strong>real, user-verified</strong> aggregated rates. To go further — a full, responsible study —
          a team would need institutional partners and would build the following.{" "}
          <strong>None of this is in the prototype.</strong>
        </p>

        <div className="grid2">
          <div>
            <h3>Real data sources</h3>
            <ul>
              <li><strong>SEER</strong> (NCI) — cancer incidence registry data.</li>
              <li><strong>U.S. Census / ACS</strong> — population, age, and demographics to compute fair rates.</li>
              <li><strong>EPA RadNet</strong> — environmental radiation monitoring measurements.</li>
              <li><strong>NRC ADAMS</strong> — nuclear regulatory documents and site records.</li>
            </ul>
          </div>
          <div>
            <h3>Ethics & permission (required first)</h3>
            <ul>
              <li><strong>IRB approval</strong> — an ethics board must review any study using human health data.</li>
              <li><strong>Data Use Agreement</strong> — a signed legal contract governing how protected data is used and secured.</li>
              <li>De-identification and strict privacy/security controls.</li>
            </ul>
          </div>
          <div>
            <h3>Geospatial approach</h3>
            <ul>
              <li><strong>PostGIS</strong> (PostgreSQL) to store and query locations as real geographic data.</li>
              <li><strong>GeoPandas</strong> (Python) for distance buffers, spatial joins, and mapping.</li>
              <li>Proper statistics: age-adjusted rates, confidence intervals, and confounder controls.</li>
            </ul>
          </div>
          <div>
            <h3>Better exposure data</h3>
            <ul>
              <li>A <strong>patient residential-history questionnaire</strong> — where someone lived and for how long, since people move.</li>
              <li>Combining lived-location history with measured contamination over time.</li>
            </ul>
          </div>
        </div>
        <p className="muted" style={{marginTop:12}}>
          This stretch vision would require partnership with a university, health department, or research
          institution. It is described here as goals — it is <strong>not</strong> implemented in this demo.
        </p>
      </div>

      <p className="muted" style={{textAlign:"center", marginTop:20}}>
        Prototype for educational FLL Innovation Project use · Individual-resident map is simulated · County panel uses real user-verified aggregate rates · No real patient information.
      </p>

      {tooltip && (
        <div className="tooltip" ref={tipRef} style={{ left: tooltip.x, top: tooltip.y }}>
          {tooltip.text}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
