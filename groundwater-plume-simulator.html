<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Groundwater Contamination Plume Simulator — FLL Innovation Project</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel2: #273449;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --warn: #fbbf24;
    --danger: #f87171;
    --good: #34d399;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 16px; }
  .brandhead { display: flex; align-items: center; gap: 16px; margin-bottom: 4px; }
  .brandlogo { flex: 0 0 auto; border-radius: 12px; }
  h1 { font-size: 26px; margin: 4px 0; }
  h2 { font-size: 20px; margin: 18px 0 8px; border-bottom: 2px solid var(--border); padding-bottom: 6px; }
  h3 { font-size: 15px; margin: 14px 0 6px; color: var(--accent); }
  p { margin: 6px 0; }
  .subtitle { color: var(--muted); margin-top: 0; }
  .banner {
    background: repeating-linear-gradient(45deg, #422006, #422006 12px, #3a1d05 12px, #3a1d05 24px);
    border: 2px solid var(--warn);
    color: #fde68a;
    padding: 12px 14px;
    border-radius: 10px;
    font-weight: 600;
    margin: 12px 0;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .banner .icon { font-size: 24px; }
  .layout { display: grid; grid-template-columns: 320px 1fr; gap: 16px; align-items: start; }
  @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .control { margin-bottom: 14px; }
  .control label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
  .control .val { color: var(--accent); font-weight: 700; }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  select, button {
    font-family: inherit;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel2);
    color: var(--text);
    padding: 8px 10px;
    width: 100%;
  }
  button { cursor: pointer; transition: background .15s; }
  button:hover { background: #324158; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-row button { width: auto; flex: 1; }
  .seg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .seg button.active { background: var(--accent); color: #06283b; border-color: var(--accent); font-weight: 700; }
  .compass { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; width: 130px; margin: 4px auto; }
  .compass button { padding: 6px 0; font-size: 12px; }
  .compass button.active { background: var(--accent); color: #06283b; font-weight: 800; }
  .compass .spacer { visibility: hidden; }
  canvas { width: 100%; height: auto; border-radius: 10px; border: 1px solid var(--border); background: #0b1220; display: block; }
  .canvas-wrap { position: relative; }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-top: 8px; align-items: center; }
  .swatch { display: inline-block; width: 14px; height: 14px; border-radius: 3px; vertical-align: middle; margin-right: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .pill.reached { background: #7f1d1d; color: #fecaca; }
  .pill.safe { background: #064e3b; color: #a7f3d0; }
  .pill.decayed { background: #374151; color: #d1d5db; }
  .hint { font-size: 12px; color: var(--muted); font-style: italic; }
  .projection {
    font-size: 12.5px;
    color: #bae6fd;
    background: rgba(56,189,248,0.10);
    border: 1px solid rgba(56,189,248,0.45);
    border-radius: 8px;
    padding: 6px 8px;
    margin: 6px 0;
    font-weight: 600;
  }
  .projection .proj-sub { display: block; font-size: 11px; color: var(--muted); font-weight: 500; font-style: italic; margin-top: 2px; }
  .future { background: var(--panel); border: 1px dashed var(--accent); border-radius: 12px; padding: 16px; margin-top: 16px; }
  .future h2 { border: none; }
  .tag { display: inline-block; background: #1e3a5f; color: var(--accent); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; margin-left: 8px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 700px) { .grid2 { grid-template-columns: 1fr; } }
  code { background: #0b1220; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  ul { margin: 6px 0; padding-left: 20px; }
  li { margin: 3px 0; }
  .isotope-note { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .footer { color: var(--muted); font-size: 12px; margin-top: 20px; text-align: center; }
  .reset { background: #422006; border-color: var(--warn); color: #fde68a; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useMemo } = React;

// ----------------------------------------------------------------------------
// REAL HALF-LIFE DATA (years). Sources are real published values.
// The model NEVER changes these — it only uses them to reduce concentration.
// ----------------------------------------------------------------------------
const ISOTOPES = {
  "tritium":      { name: "Tritium (H-3)",       halfLife: 12.32,        note: "Hydrogen with extra neutrons. Moves fast in water, fades fast." },
  "strontium90":  { name: "Strontium-90",        halfLife: 28.8,         note: "Acts like calcium, can collect in bones." },
  "cesium137":    { name: "Cesium-137",          halfLife: 30.17,        note: "A common Manhattan Project fission leftover." },
  "radium226":    { name: "Radium-226",          halfLife: 1600,         note: "Found at St. Louis FUSRAP / Coldwater Creek waste." },
  "thorium230":   { name: "Thorium-230",         halfLife: 75400,        note: "Part of the uranium decay chain in mill waste." },
  "technetium99": { name: "Technetium-99",       halfLife: 211000,       note: "Very mobile in groundwater; a big Hanford concern." },
  "iodine129":    { name: "Iodine-129",          halfLife: 15700000,     note: "Extremely long-lived and very mobile." },
  "uranium238":   { name: "Uranium-238",         halfLife: 4470000000,   note: "Essentially does not decay on human timescales." },
};

// Permeability presets — relative speed multipliers (educational, not site-validated)
const PERMEABILITY = {
  slow:   { label: "Slow (clay-like)",  coeff: 0.35 },
  medium: { label: "Medium (sandy)",    coeff: 1.0 },
  fast:   { label: "Fast (gravel)",     coeff: 2.6 },
};

// Compass directions -> angle in degrees (0 = North, clockwise)
const DIRECTIONS = {
  N:  0, NE: 45, E: 90, SE: 135, S: 180, SW: 225, W: 270, NW: 315,
};

// Domain is a square of this many meters across.
const DOMAIN_M = 4000;
const GRID = 90; // cells per side for the concentration field render
const REACH_THRESHOLD = 0.04; // intensity above this = "plume reached here"

// Example scenarios -------------------------------------------------------
// Default values are set from PUBLIC summary figures (see "Where the numbers
// come from" section). They are realistic ballparks for a teaching model, NOT
// exact site measurements — always cite the source report PDF for real numbers.
const SCENARIOS = {
  hanford: {
    label: "Hanford (WA) — vadose zone groundwater",
    isotope: "technetium99",
    perm: "fast",
    flowRate: 150,          // m/yr — gravelly Hanford fm. is very permeable; DOE says plume could reach the Columbia in ~12–50 yr
    direction: "E",
    depth: 80,              // ~60–100 m thick unsaturated "vadose" zone on the Central Plateau (DOE/PNNL reports)
    source: { x: 0.18, y: 0.5 },
    pops: [
      { name: "River intake (Columbia)", x: 0.92, y: 0.46 },
      { name: "Richland (downstream)",   x: 0.80, y: 0.74 },
      { name: "Far well field",          x: 0.55, y: 0.30 },
    ],
    why: "Hanford: DOE/PNNL annual groundwater reports describe a ~60–100 m thick vadose zone and very permeable gravels; Tc-99 + uranium are the main mobile contaminants. DOE has stated contaminated groundwater could reach the Columbia River in roughly 12–50 years.",
  },
  stlouis: {
    label: "St. Louis FUSRAP — Coldwater Creek area (MO)",
    isotope: "radium226",
    perm: "slow",
    flowRate: 35,           // shallow floodplain alluvium; slower movement than Hanford gravels
    direction: "SE",
    depth: 6,               // shallow waste near surface; depth-to-groundwater only a few meters (USACE FUSRAP RI data)
    source: { x: 0.30, y: 0.28 },
    pops: [
      { name: "Florissant homes",   x: 0.66, y: 0.60 },
      { name: "Creekside park",     x: 0.50, y: 0.48 },
      { name: "School + ballfield", x: 0.78, y: 0.78 },
    ],
    why: "St. Louis FUSRAP (USACE): contamination is shallow and tied to the Coldwater Creek floodplain, so depth-to-groundwater is only a few meters (very different from Hanford). Radium-226 and thorium-230 are the headline radionuclides.",
  },
};

// ----------------------------------------------------------------------------
// PHYSICS-LITE: a moving Gaussian "blob" (simplified advection–dispersion).
// along = distance in the flow direction; perp = sideways distance.
// center moves out at velocity v; spreads more along flow than sideways.
// decay shrinks the concentration using the REAL half-life.
// ----------------------------------------------------------------------------
function dirVector(angleDeg) {
  const a = (angleDeg * Math.PI) / 180;
  // North = up = -y (screen y grows downward)
  return { dx: Math.sin(a), dy: -Math.cos(a) };
}

function velocity(flowRate, permCoeff) {
  return flowRate * permCoeff; // meters per year
}

// Disposal depth -> a time LAG before the plume reaches the water table and
// starts spreading sideways. Deeper waste + tighter (slower) soil = longer lag.
// Waste still DECAYS during this time; it just hasn't started traveling yet.
function verticalLag(depth, permCoeff) {
  const vertRate = 6 * permCoeff; // downward seepage m/yr (slow~2.1, med~6, fast~15.6)
  return depth / vertRate;        // years before horizontal spreading begins
}

function decayFactor(years, halfLifeYears) {
  return Math.pow(0.5, years / halfLifeYears);
}

// SCALE-DEPENDENT DISPERSIVITY (real, peer-reviewed hydrogeology).
// Field studies show a plume spreads WIDER the farther it travels. The
// longitudinal dispersivity grows with travel distance L (meters):
//   alphaL = 0.83 * (log10 L)^2.414     (Xu & Eckstein, 1995; Gelhar et al., 1992)
// Transverse spreading is ~1/10 of longitudinal (Gelhar field-data ratio).
function longitudinalDispersivity(L) {
  if (L < 1) return 0.1;
  return 0.83 * Math.pow(Math.log10(L), 2.414); // meters
}

// Total path the contaminant has traveled = vertical descent through the
// vadose zone (disposal depth) + horizontal distance carried by groundwater.
// Bigger depth OR faster/farther flow => longer L => more dispersion => wider plume.
function travelPath(depth, d) {
  return Math.max(1, (depth || 0) + Math.max(d, 0));
}

// Gaussian std devs (m) from the advection–dispersion equation: sigma = sqrt(2*alpha*d).
// SRC0 is the initial physical size of the buried source.
const SRC0_L = 25, SRC0_T = 12;
function sigmas(depth, d) {
  const L = travelPath(depth, d);
  const alphaL = longitudinalDispersivity(L);
  const alphaT = alphaL / 10; // Gelhar transverse:longitudinal ~ 0.1
  const dd = Math.max(d, 1);
  return {
    sigmaL: Math.sqrt(2 * alphaL * dd) + SRC0_L,
    sigmaT: Math.sqrt(2 * alphaT * dd) + SRC0_T,
    alphaL, alphaT,
  };
}

// intensity at a point (meters) given time (years) and settings. 0..~1
function intensityAt(px, py, sx, sy, t, settings) {
  const { dx, dy } = settings.dirVec;
  const v = settings.v;
  // along/perp coordinates relative to the source
  const rx = px - sx;
  const ry = py - sy;
  const along = rx * dx + ry * dy;
  const perp = rx * (-dy) + ry * dx;
  // disposal depth delays the start: only time AFTER the lag drives travel
  const tEff = Math.max(0, t - (settings.lagYears || 0));
  // center of the blob travels distance d along the flow direction
  const d = v * tEff;
  // scale-dependent spreading driven by total travel path (depth + distance)
  const { sigmaL, sigmaT } = sigmas(settings.depth, d);
  const ea = (along - d) * (along - d) / (2 * sigmaL * sigmaL);
  const ep = perp * perp / (2 * sigmaT * sigmaT);
  const shape = Math.exp(-(ea + ep));
  return shape * settings.decay;
}

// how far the plume's leading edge has traveled along the flow at time t (meters),
// or null if it is too diluted/decayed to register. Used to PROJECT reach.
function frontDistance(t, settings) {
  const tEff = Math.max(0, t - (settings.lagYears || 0));
  const d = settings.v * tEff;
  if (d < 1) return 0;
  const decay = settings.decay;
  if (decay <= REACH_THRESHOLD) return null; // already too weak even at the center
  const { sigmaL } = sigmas(settings.depth, d);
  // solve exp(-(s-d)^2 / (2 sigmaL^2)) * decay = threshold  for the far edge s>d
  const edge = sigmaL * Math.sqrt(2 * Math.log(decay / REACH_THRESHOLD));
  return d + edge;
}

// Plume footprint at the REACH_THRESHOLD contour (an ellipse around the moving
// center). Returns center travel distance + half-length & half-width in meters,
// or null if the plume is too weak to register. Used to draw the spread on the map.
function plumeEnvelope(t, settings) {
  const tEff = Math.max(0, t - (settings.lagYears || 0));
  const d = settings.v * tEff;
  const decay = settings.decay;
  if (decay <= REACH_THRESHOLD) return null;
  const { sigmaL, sigmaT } = sigmas(settings.depth, Math.max(d, 1));
  const C = 2 * Math.log(decay / REACH_THRESHOLD); // contour: r^2 = C in sigma units
  return {
    d,
    halfLen: sigmaL * Math.sqrt(C), // along-flow semi-axis (m)
    halfWid: sigmaT * Math.sqrt(C), // cross-flow semi-axis (m)
  };
}

// find the earliest year (scanning) when a point's intensity crosses threshold
function arrivalYear(px, py, sx, sy, settings, maxYears) {
  const steps = 600;
  let prev = 0;
  for (let i = 1; i <= steps; i++) {
    const t = (i / steps) * maxYears;
    const decay = decayFactor(t, settings.halfLife);
    const s2 = { ...settings, decay };
    const val = intensityAt(px, py, sx, sy, t, s2);
    if (val >= REACH_THRESHOLD) {
      return t;
    }
    prev = val;
  }
  // never reached threshold within window — check if it would by advection
  // (peak passes by but stays below threshold => "too diluted / decayed")
  return null;
}

// color ramp for concentration intensity
function colorFor(v) {
  // v in 0..1 -> transparent yellow -> orange -> red -> dark red
  if (v < 0.015) return null;
  const c = Math.min(v, 1);
  let r, g, b;
  if (c < 0.33) { r = 250; g = 240; b = 90; }
  else if (c < 0.6) { r = 251; g = 146; b = 60; }
  else if (c < 0.8) { r = 239; g = 68; b = 68; }
  else { r = 153; g = 27; b = 27; }
  const a = 0.25 + 0.65 * c;
  return `rgba(${r},${g},${b},${a.toFixed(3)})`;
}

function fmtYears(y) {
  if (y == null) return "—";
  if (y < 1) return "< 1 yr";
  if (y < 100) return y.toFixed(0) + " yr";
  if (y < 10000) return Math.round(y / 10) * 10 + " yr";
  if (y < 1e6) return (y / 1000).toFixed(1) + "k yr";
  if (y < 1e9) return (y / 1e6).toFixed(1) + " million yr";
  return (y / 1e9).toFixed(1) + " billion yr";
}

// format a spread distance in meters/kilometers
function fmtSpread(m) {
  if (m == null) return "—";
  if (m >= 1000) return (m / 1000).toFixed(1) + " km";
  return Math.max(10, Math.round(m / 10) * 10) + " m";
}

// ---- realistic map rendering ------------------------------------------
// deterministic pseudo-random (so terrain texture doesn't flicker each frame)
function seeded(s) {
  return function () {
    s |= 0; s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// draw a label with a dark outline so it stays readable over terrain
function labelText(ctx, text, x, y, fill, align) {
  ctx.textAlign = align || "center";
  ctx.lineJoin = "round";
  ctx.lineWidth = 3;
  ctx.strokeStyle = "rgba(15,23,42,0.85)";
  ctx.strokeText(text, x, y);
  ctx.fillStyle = fill;
  ctx.fillText(text, x, y);
}

// per-site map "theme": land palette + a real water feature (river/creek)
const SITE_MAPS = {
  hanford: {
    land: ["#cdb98a", "#c3aa78", "#d4c499"], // arid shrub-steppe tans
    veg: "rgba(120,130,80,0.30)",            // sparse sage patches
    river: { name: "Columbia River",
      pts: [[0.74, -0.02], [0.82, 0.22], [0.78, 0.45], [0.88, 0.66], [0.83, 0.86], [0.9, 1.05]],
      width: 26 },
  },
  stlouis: {
    land: ["#9bb172", "#8aa564", "#a7bd82"], // green floodplain
    veg: "rgba(70,110,55,0.32)",             // wooded / park patches
    urban: "rgba(150,150,158,0.28)",         // suburban blocks
    river: { name: "Coldwater Creek",
      pts: [[0.06, 0.12], [0.3, 0.32], [0.5, 0.46], [0.66, 0.64], [0.82, 0.78], [1.04, 0.9]],
      width: 14 },
  },
  _default: {
    land: ["#a9b88c", "#9fb081", "#b3c098"], // generic terrain
    veg: "rgba(90,120,70,0.25)",
    river: { name: "Stream",
      pts: [[-0.02, 0.78], [0.28, 0.7], [0.55, 0.74], [0.8, 0.64], [1.04, 0.68]],
      width: 12 },
  },
};

function drawSiteMap(ctx, W, H, scenarioKey) {
  const theme = SITE_MAPS[scenarioKey] || SITE_MAPS._default;
  const rnd = seeded(scenarioKey === "hanford" ? 11 : scenarioKey === "stlouis" ? 23 : 7);

  // base land gradient
  const g = ctx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, theme.land[0]);
  g.addColorStop(0.5, theme.land[1]);
  g.addColorStop(1, theme.land[2]);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // soft vegetation / terrain blotches
  ctx.fillStyle = theme.veg;
  for (let i = 0; i < 60; i++) {
    const x = rnd() * W, y = rnd() * H, r = 14 + rnd() * 46;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }

  // suburban block texture (St. Louis)
  if (theme.urban) {
    ctx.fillStyle = theme.urban;
    for (let i = 0; i < 26; i++) {
      const x = rnd() * W, y = rnd() * H, w = 16 + rnd() * 26, h = 12 + rnd() * 20;
      ctx.fillRect(x, y, w, h);
    }
  }

  // water feature (river / creek) — smooth curve through the points
  const pts = theme.river.pts.map(([nx, ny]) => [nx * W, ny * H]);
  const drawCurve = (lw, color) => {
    ctx.strokeStyle = color; ctx.lineWidth = lw;
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 0; i < pts.length - 1; i++) {
      const [x0, y0] = pts[i], [x1, y1] = pts[i + 1];
      ctx.quadraticCurveTo(x0, y0, (x0 + x1) / 2, (y0 + y1) / 2);
    }
    ctx.stroke();
  };
  drawCurve(theme.river.width + 4, "rgba(30,60,90,0.55)"); // bank shadow
  drawCurve(theme.river.width, "#3b82c4");                  // water
  drawCurve(Math.max(2, theme.river.width * 0.45), "#7cc1e6"); // shimmer

  // river label
  const mid = pts[Math.floor(pts.length / 2)];
  ctx.save();
  ctx.font = "italic bold 12px sans-serif";
  labelText(ctx, theme.river.name, mid[0], mid[1] - 10, "#dbeafe");
  ctx.restore();

  // faint survey grid on top of the land
  ctx.strokeStyle = "rgba(40,40,40,0.10)";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 10; i++) {
    const p = (i / 10) * W;
    ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(W, p); ctx.stroke();
  }
}

function App() {
  const [isotopeKey, setIsotopeKey] = useState("strontium90");
  const [perm, setPerm] = useState("medium");
  const [flowRate, setFlowRate] = useState(80);     // m/yr
  const [direction, setDirection] = useState("E");
  const [depth, setDepth] = useState(40);           // meters
  const [year, setYear] = useState(20);             // current time slider
  const [maxYears, setMaxYears] = useState(200);
  const [source, setSource] = useState({ x: 0.25, y: 0.5 });
  const [pops, setPops] = useState([
    { name: "Town A", x: 0.7, y: 0.4 },
    { name: "Town B", x: 0.6, y: 0.7 },
  ]);
  const [placeMode, setPlaceMode] = useState("pop"); // "pop" | "source"
  const [scenarioKey, setScenarioKey] = useState("");
  const canvasRef = useRef(null);

  const isotope = ISOTOPES[isotopeKey];
  const permCoeff = PERMEABILITY[perm].coeff;
  const angle = DIRECTIONS[direction];
  const dirVec = useMemo(() => dirVector(angle), [angle]);
  const v = velocity(flowRate, permCoeff);
  const lagYears = verticalLag(depth, permCoeff);

  const settings = useMemo(() => ({
    dirVec, v, lagYears, depth, halfLife: isotope.halfLife,
    decay: decayFactor(year, isotope.halfLife),
  }), [dirVec, v, lagYears, depth, isotope.halfLife, year]);

  // source/pop positions in meters
  const sx = source.x * DOMAIN_M;
  const sy = source.y * DOMAIN_M;

  // arrival times for each population point (independent of slider position)
  const arrivals = useMemo(() => {
    const base = { dirVec, v, lagYears, depth, halfLife: isotope.halfLife, decay: 1 };
    return pops.map((p) => {
      const px = p.x * DOMAIN_M, py = p.y * DOMAIN_M;
      const yr = arrivalYear(px, py, sx, sy, base, Math.max(maxYears, isotope.halfLife * 4));
      return yr;
    });
  }, [pops, dirVec, v, lagYears, depth, isotope.halfLife, sx, sy, maxYears]);

  // live projected reach of the plume front at the current year (meters)
  const reachM = useMemo(
    () => frontDistance(year, settings),
    [year, settings]
  );

  // live plume footprint (spread) at the current year
  const envelope = useMemo(
    () => plumeEnvelope(year, settings),
    [year, settings]
  );

  // draw the concentration field + markers
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // ---- realistic terrain map background (reflects the real US site) ----
    drawSiteMap(ctx, W, H, scenarioKey);

    // plume field
    const cell = W / GRID;
    for (let gx = 0; gx < GRID; gx++) {
      for (let gy = 0; gy < GRID; gy++) {
        const mx = ((gx + 0.5) / GRID) * DOMAIN_M;
        const my = ((gy + 0.5) / GRID) * DOMAIN_M;
        const val = intensityAt(mx, my, sx, sy, year, settings);
        const col = colorFor(val);
        if (col) {
          ctx.fillStyle = col;
          ctx.fillRect(gx * cell, gy * cell, cell + 1, cell + 1);
        }
      }
    }

    const toPx = (nx, ny) => [nx * W, ny * H];

    // flow direction arrow (from source)
    const [spx, spy] = toPx(source.x, source.y);
    const arrowLen = 46;
    const ax = spx + dirVec.dx * arrowLen;
    const ay = spy + dirVec.dy * arrowLen;
    ctx.strokeStyle = "#38bdf8";
    ctx.fillStyle = "#38bdf8";
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(spx, spy); ctx.lineTo(ax, ay); ctx.stroke();
    // arrowhead
    const ah = Math.atan2(dirVec.dy, dirVec.dx);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - 10 * Math.cos(ah - 0.4), ay - 10 * Math.sin(ah - 0.4));
    ctx.lineTo(ax - 10 * Math.cos(ah + 0.4), ay - 10 * Math.sin(ah + 0.4));
    ctx.closePath(); ctx.fill();

    // ---- plume spread footprint (scale-dependent dispersivity) ----
    // an ellipse at the REACH_THRESHOLD contour: length along flow, width across.
    // Faster flow pushes it farther AND (because dispersivity grows with travel
    // distance) wider; deeper disposal adds to the travel path -> also wider.
    if (envelope && envelope.halfWid > 1) {
      const mPerPxX = DOMAIN_M / W;
      const dPx = envelope.d / mPerPxX;
      const cx = spx + dirVec.dx * dPx;
      const cy = spy + dirVec.dy * dPx;
      const rX = envelope.halfLen / mPerPxX; // along-flow radius (px)
      const rY = envelope.halfWid / mPerPxX; // cross-flow radius (px)
      const rot = Math.atan2(dirVec.dy, dirVec.dx);
      ctx.save();
      ctx.setLineDash([6, 5]);
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(250,204,21,0.85)"; // yellow outline = "plume edge"
      ctx.fillStyle = "rgba(250,204,21,0.08)";
      ctx.beginPath();
      ctx.ellipse(cx, cy, Math.max(rX, 2), Math.max(rY, 2), rot, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    // ---- projected plume-reach front (driven by flow rate + depth) ----
    // a dashed line perpendicular to the flow at the plume's leading edge,
    // so dragging the flow-rate / depth sliders visibly pushes reach in/out.
    if (reachM != null && reachM > 1) {
      const reachPx = (reachM / DOMAIN_M) * W;
      const fx = spx + dirVec.dx * reachPx;
      const fy = spy + dirVec.dy * reachPx;
      // perpendicular unit vector
      const pxv = -dirVec.dy, pyv = dirVec.dx;
      const halfLen = 70;
      ctx.save();
      ctx.setLineDash([8, 6]);
      ctx.strokeStyle = "rgba(56,189,248,0.95)";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(fx - pxv * halfLen, fy - pyv * halfLen);
      ctx.lineTo(fx + pxv * halfLen, fy + pyv * halfLen);
      ctx.stroke();
      ctx.setLineDash([]);
      // little tick at the center of the front
      ctx.fillStyle = "rgba(56,189,248,0.95)";
      ctx.beginPath(); ctx.arc(fx, fy, 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.font = "bold 11px sans-serif";
      const reachLabel = reachM >= 1000
        ? "Plume front ~" + (reachM / 1000).toFixed(1) + " km"
        : "Plume front ~" + Math.round(reachM / 10) * 10 + " m";
      labelText(ctx, reachLabel, fx, fy - 10, "#bae6fd");
      ctx.restore();
    }

    // source marker
    ctx.fillStyle = "#facc15";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(spx, spy, 9, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#000";
    ctx.font = "bold 11px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("☢", spx, spy + 4);
    ctx.font = "bold 11px sans-serif";
    labelText(ctx, "Waste site", spx, spy - 14, "#fde047");

    // population markers
    pops.forEach((p, i) => {
      const [ppx, ppy] = toPx(p.x, p.y);
      const px = p.x * DOMAIN_M, py = p.y * DOMAIN_M;
      const val = intensityAt(px, py, sx, sy, year, settings);
      const reached = val >= REACH_THRESHOLD;
      ctx.fillStyle = reached ? "#f87171" : "#34d399";
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(ppx, ppy, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.font = "bold 11px sans-serif";
      labelText(ctx, p.name + (reached ? " ⚠" : ""), ppx, ppy - 12, reached ? "#fecaca" : "#ffffff");
    });

    // North indicator + scale bar
    ctx.textAlign = "left";
    ctx.font = "bold 12px sans-serif";
    labelText(ctx, "⬆ N", 8, 18, "#f8fafc", "left");
    // scale bar: domain is 4000 m across, draw a 1 km reference
    const kmPx = (1000 / DOMAIN_M) * W;
    const bx = W - kmPx - 14, by = H - 16;
    ctx.strokeStyle = "rgba(0,0,0,0.65)"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx + kmPx, by); ctx.stroke();
    ctx.strokeStyle = "#f8fafc"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx + kmPx, by); ctx.stroke();
    ctx.font = "bold 11px sans-serif";
    labelText(ctx, "1 km", bx + kmPx / 2, by - 6, "#f8fafc");
  }, [year, settings, source, pops, sx, sy, dirVec, scenarioKey]);

  function handleCanvasClick(e) {

                <option key={k} value={k}>{iso.name} — half-life {fmtYears(iso.halfLife)}</option>
              ))}

            <div className="isotope-note">{isotope.note}</div>
          </div>

          <div className="control">
            <label>Soil permeability</label>
            <div className="seg">
              {Object.entries(PERMEABILITY).map(([k, p]) => (
                <button key={k} className={perm===k?"active":""} onClick={() => setPerm(k)}>{k}</button>
              ))}
            </div>

            <label>Groundwater flow direction</label>
            <div className="compass">
              {compassLayout.map((d, i) => d === "spacer"

              <span className="proj-sub">🟡 Spread footprint now: {envelope ? fmtSpread(2*envelope.halfLen) + " long × " + fmtSpread(2*envelope.halfWid) + " wide" : "—"} — raise flow rate to push the yellow plume edge out <i>and</i> widen it</span>
            </div>

            <input type="range" min="2" max="120" value={depth} onChange={(e) => setDepth(+e.target.value)} />
            <div className="hint">Deeper waste takes longer to reach the water table (slows the start a little).</div>

              ⏳ Start delay (seep down to water table): <b>{lagYears < 1 ? "< 1 yr" : Math.round(lagYears) + " yr"}</b>
              <span className="proj-sub">🔬 Deeper disposal also lengthens the contaminant's total travel path, so by <b>scale-dependent dispersivity</b> the plume spreads <i>wider</i> — not just later</span>

            <div className="canvas-wrap">

            </div>
            <div className="legend">
              <span><span className="swatch" style={{background:"#faf05a"}}></span>low</span>
              <span><span className="swatch" style={{background:"#fb923c"}}></span>medium</span>

              <span><span className="swatch" style={{background:"#34d399"}}></span>town (safe)</span>
              <span><span className="swatch" style={{background:"#f87171"}}></span>town (plume reached)</span>
              <span><span className="swatch" style={{background:"transparent", border:"2px dashed #facc15"}}></span>plume spread edge</span>
              <span>Map ≈ {(DOMAIN_M/1000).toFixed(0)} km across · click to add towns</span>
            </div>

            <div className="control" style={{marginTop:14}}>
              <label>⏱ Time since release: <span className="val">{fmtYears(year)}</span> &nbsp;·&nbsp; concentration now at <b>{(decayFactor(year, isotope.halfLife)*100).toFixed(1)}%</b> of original (from decay)</label>
              <input type="range" min="0" max={maxYears} value={Math.min(year, maxYears)} onChange={(e) => setYear(+e.target.value)} />
              <div className="hint">Decay window: <b>0 – {fmtYears(maxYears)}</b>.{" "}
                <button style={{width:"auto", display:"inline-block", padding:"2px 8px", marginLeft:6}} onClick={() => setMaxYears((m) => m*2)}>×2 longer</button>{" "}
                <button style={{width:"auto", display:"inline-block", padding:"2px 8px"}} onClick={() => setMaxYears((m) => Math.max(50, Math.round(m/2)))}>÷2 shorter</button>
              </div>

          </div>

          {/* READOUT TABLE */}
          <div className="panel" style={{marginTop:14}}>
            <h3>Readout — when does the plume reach each town?</h3>
            <table>
              <thead>
                <tr><th>Town</th><th>Status now ({fmtYears(year)})</th><th>Estimated arrival</th></tr>

              <tbody>
                {pops.length === 0 && (
                  <tr><td colSpan="3" className="hint">No towns placed. Click the map (Add town mode) to add population points.</td></tr>
                )}
                {pops.map((p, i) => {
                  const px = p.x*DOMAIN_M, py = p.y*DOMAIN_M;
                  const nowVal = intensityAt(px, py, sx, sy, year, settings);
                  const reachedNow = nowVal >= REACH_THRESHOLD;
                  const arr = arrivals[i];
                  let arrLabel, pillCls, pillTxt;
                  if (arr == null) { arrLabel = "does not reach (too diluted / decays first)"; pillCls = "decayed"; pillTxt = "never (in window)"; }
                  else { arrLabel = "~ " + fmtYears(arr); pillCls = reachedNow ? "reached" : "safe"; pillTxt = reachedNow ? "PLUME HERE" : "not yet"; }
                  return (
                    <tr key={i}>
                      <td>{p.name}</td>

                      <td>{arrLabel}</td>

              </tbody>
            </table>
            <p className="hint">"Arrival" = first year the model's concentration at that town rises above a small reach threshold. The depth setting adds a short delay before the plume starts spreading.</p>
          </div>
        </div>
      </div>

      {/* ---------------- HOW THE MODEL WORKS ---------------- */}
      <h2>How this simplified model works 🧪</h2>
      <div className="grid2">
        <div className="panel">
          <h3>The 3 big ideas (sixth-grader version)</h3>
          <ul>
            <li><b>Advection</b> = the groundwater pushes the pollution along, like a slow river. Faster flow + more permeable soil = the plume travels farther each year.</li>
            <li><b>Dispersion</b> = the plume also spreads out and gets wider as it travels, so the edges get blurry and weaker. Real plumes spread <i>more</i> the farther they go — we use the published rule <b>αʟ ≈ 0.83·(log₁₀ L)^2.414</b> (Xu &amp; Eckstein 1995; Gelhar et al. 1992), so faster flow and deeper disposal both widen the yellow plume edge.</li>
            <li><b>Radioactive decay</b> = over time the radioactive atoms turn into other atoms, so the <i>concentration</i> goes down. We cut it in half every half-life.</li>
          </ul>
        </div>
        <div className="panel">
          <h3>Important honesty notes</h3>
          <ul>
            <li>The model <b>does not change the half-life</b> — those are fixed real numbers. Decay only lowers the <i>concentration</i> shown on the map.</li>
            <li>Short-lived isotopes (like tritium, 12.3 yr) can fade away <i>before</i> reaching a far town. Long-lived ones (uranium-238) basically never fade, so distance and flow decide everything.</li>
            <li>Permeability values (slow/medium/fast) are simple teaching presets, not measured site values.</li>
            <li>We use a <i>real</i> dispersivity formula, but it is wrapped around a single 2D Gaussian “blob,” not a full 3D solver — so the spread is scientifically <i>shaped</i> but not site-calibrated.</li>
          </ul>
        </div>
      </div>

      {/* ---------------- REAL-WORLD SECTION ---------------- */}
      <div className="future">
        <h2>🏗️ Real-World Implementation <span className="tag">FUTURE WORK</span></h2>
        <p>If real scientists and engineers built this for a real site, they would <b>not</b> use our toy math. Here is how the grown-up version works — and we are clearly labeling this as future work, not what our prototype does.</p>

        <div className="grid2">
          <div>
            <h3>Real industry-standard models (USGS)</h3>
            <ul>
              <li><b>MODFLOW</b> — the U.S. Geological Survey's free, open-source groundwater <i>flow</i> model. It solves how water actually moves through aquifers in 3D using real geology. It is the worldwide standard for groundwater modeling.</li>
              <li><b>MT3DMS</b> — a companion model that takes MODFLOW's flow field and simulates how a <i>contaminant</i> moves and spreads (transport): advection, dispersion, and chemical reactions. (MT3D-USGS is the newer USGS-supported version.)</li>
            </ul>
            <p className="hint">Our prototype does <b>not</b> run MODFLOW or MT3DMS. We only describe them accurately here as the real tools professionals use.</p>
          </div>
          <div>
            <h3>Real data sources you would plug in</h3>
            <ul>
              <li><b>EPA Superfund / CERCLIS (SEMS)</b> — official coordinates and records for contaminated sites like Hanford and the St. Louis FUSRAP sites.</li>
              <li><b>USGS NWIS</b> (National Water Information System) — real measured groundwater levels, aquifer properties, and flow data from monitoring wells.</li>
              <li><b>U.S. Census block-group data</b> — real population counts you would layer on the map to count how many people live inside a predicted plume.</li>
            </ul>
          </div>
        </div>

        <h3>How it would fit together</h3>
        <ul>
          <li>1️⃣ Pull the real site location from <b>EPA Superfund/CERCLIS</b>.</li>
          <li>2️⃣ Pull aquifer + flow data from <b>USGS NWIS</b> to build the geology.</li>
          <li>3️⃣ Run <b>MODFLOW</b> for water flow, then <b>MT3DMS</b> for contaminant transport.</li>
          <li>4️⃣ Overlay <b>Census block-group population</b> to estimate how many people each plume scenario could affect.</li>
        </ul>
        <p className="hint">(We left out "DOE WINDMIL" because we could not verify it is a real framework. We only list tools we can confirm are real.)</p>
      </div>

      <div className="footer">
        Built as a FIRST LEGO League Innovation Project · Educational prototype · Half-life values are real published figures used only to scale concentration.
      </div>
    </div>
  );
}
