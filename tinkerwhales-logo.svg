<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="TinkerWhales FLL Team 63015 logo">
  <defs>
    <linearGradient id="tw-ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="tw-whale" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="tw-spout" cx="0.5" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#bae6fd"/>
    </radialGradient>
  </defs>

  <!-- badge background -->
  <circle cx="160" cy="160" r="150" fill="url(#tw-ocean)" stroke="#0b4f63" stroke-width="6"/>
  <circle cx="160" cy="160" r="150" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.5"/>

  <!-- water highlight -->
  <path d="M30 205 Q160 175 290 205 L290 250 Q160 220 30 250 Z" fill="#ffffff" fill-opacity="0.10"/>

  <!-- whale body -->
  <path d="M96 150
           C96 116 126 96 162 96
           C206 96 236 122 246 150
           C262 150 276 140 284 132
           C280 156 270 168 256 174
           C250 196 224 214 188 216
           L140 216
           C112 216 92 196 90 172
           C78 170 66 160 60 150
           C72 152 86 152 96 150 Z"
        fill="url(#tw-whale)" stroke="#0f1f4d" stroke-width="4" stroke-linejoin="round"/>

  <!-- belly -->
  <path d="M118 198 C140 214 188 214 214 198 C200 210 176 216 166 216 L144 216 C134 214 124 206 118 198 Z"
        fill="#bfdbfe" fill-opacity="0.85"/>

  <!-- eye -->
  <circle cx="150" cy="142" r="9" fill="#ffffff"/>
  <circle cx="153" cy="143" r="4.5" fill="#0f172a"/>

  <!-- smile -->
  <path d="M150 160 Q166 172 184 160" fill="none" stroke="#0f1f4d" stroke-width="3.5" stroke-linecap="round"/>

  <!-- wrench (the "Tinker" nod) -->
  <g transform="rotate(40 206 150)">
    <!-- handle -->
    <rect x="198" y="146" width="58" height="13" rx="4" fill="#fbbf24" stroke="#92400e" stroke-width="3"/>
    <!-- open jaw head -->
    <path d="M206 152
             a20 20 0 1 0 0 1
             l-8 0
             a12 12 0 1 1 0 -1 Z"
          fill="#fbbf24" stroke="#92400e" stroke-width="3" stroke-linejoin="round"/>
    <path d="M188 138 l0 12 12 0" fill="#0e7490"/>
    <path d="M188 162 l0 -12 12 0" fill="#0e7490"/>
  </g>

  <!-- curved team name (top) -->
  <path id="tw-arc-top" d="M52 160 A108 108 0 0 1 268 160" fill="none"/>
  <text font-family="Verdana, Geneva, sans-serif" font-weight="700" font-size="30" fill="#ffffff" letter-spacing="2">
    <textPath href="#tw-arc-top" startOffset="50%" text-anchor="middle">TINKERWHALES</textPath>
  </text>

  <!-- bottom ribbon -->
  <g>
    <rect x="78" y="236" width="164" height="38" rx="19" fill="#0b4f63" stroke="#ffffff" stroke-width="2"/>
    <text x="160" y="262" font-family="Verdana, Geneva, sans-serif" font-weight="700" font-size="20"
          fill="#ffffff" text-anchor="middle" letter-spacing="1">TEAM 63015</text>
  </g>

  <!-- city tag -->
  <text x="160" y="294" font-family="Verdana, Geneva, sans-serif" font-weight="600" font-size="12"
        fill="#ffffff" fill-opacity="0.9" text-anchor="middle" letter-spacing="2">ST. LOUIS, MO</text>
</svg>
